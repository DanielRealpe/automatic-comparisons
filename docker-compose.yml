version: "3.9"

services:
  comparador:
    build: .
    container_name: comparador-cotizaciones

    env_file:
      - .env

    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs

    working_dir: /app

    stdin_open: true
    tty: true

    command: tail -f /dev/null